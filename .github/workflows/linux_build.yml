name: Linux Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: CI Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit message lint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional
          npx commitlint --from HEAD~1 --to HEAD --verbose

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Download dependencies
        run: go mod download

      - name: Static analysis
        run: go vet ./...

      - name: Build platform
        run: go build -o bin/clawfactory ./cmd/clawfactory

      - name: Build CLI
        run: go build -o bin/claw ./cmd/claw

      - name: Run tests
        run: go test -count=1 -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
